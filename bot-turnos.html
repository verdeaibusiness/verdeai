<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Demo – Bot de Turnos · VerdeAI</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--v:#38e07b;--bg:#080c0a;--bg2:#0d1410;--bg3:#111a14;--bg4:#172019;--border:rgba(56,224,123,0.1);--border2:rgba(56,224,123,0.18);--muted:#6b8a75;--white:#eef6f1;--fs:'Syne',sans-serif;--fb:'DM Sans',sans-serif}
body{background:var(--bg);color:var(--white);font-family:var(--fb);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem 1rem}

.back{position:fixed;top:1.5rem;left:1.5rem;display:flex;align-items:center;gap:.5rem;text-decoration:none;color:var(--muted);font-size:.82rem;border:1px solid var(--border);padding:.4rem .9rem;border-radius:100px;transition:all .2s}
.back:hover{color:var(--white);border-color:var(--border2)}

.demo-header{text-align:center;margin-bottom:2rem}
.demo-label{font-size:.7rem;text-transform:uppercase;letter-spacing:.15em;color:var(--v);margin-bottom:.5rem}
.demo-header h1{font-family:var(--fs);font-weight:800;font-size:clamp(1.6rem,4vw,2.4rem);letter-spacing:-.03em}
.demo-header h1 em{font-style:normal;color:var(--v)}
.demo-header p{color:var(--muted);font-size:.9rem;margin-top:.5rem;font-weight:300}

.phone{width:340px;background:var(--bg2);border:1px solid var(--border2);border-radius:28px;overflow:hidden;box-shadow:0 40px 80px rgba(0,0,0,.5)}
.phone-bar{background:var(--bg3);padding:.9rem 1.2rem;display:flex;align-items:center;gap:.7rem;border-bottom:1px solid var(--border)}
.phone-avatar{width:36px;height:36px;border-radius:50%;background:rgba(56,224,123,.15);border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:1.1rem;flex-shrink:0}
.phone-info strong{font-size:.88rem;display:block}
.phone-info span{font-size:.7rem;color:var(--v)}

.messages{height:400px;overflow-y:auto;padding:1.2rem;display:flex;flex-direction:column;gap:.7rem;scroll-behavior:smooth}
.messages::-webkit-scrollbar{width:3px}
.messages::-webkit-scrollbar-thumb{background:var(--border2);border-radius:10px}

.msg{display:flex;gap:.5rem;align-items:flex-end;max-width:90%}
.msg.bot{align-self:flex-start}
.msg.user{align-self:flex-end;flex-direction:row-reverse}
.msg-avatar{width:26px;height:26px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:.75rem}
.bot .msg-avatar{background:rgba(56,224,123,.12);border:1px solid var(--border2)}
.user .msg-avatar{background:rgba(56,224,123,.25)}
.msg-bubble{font-size:.8rem;padding:.55rem .8rem;border-radius:12px;line-height:1.5}
.bot .msg-bubble{background:var(--bg4);color:var(--white);border-radius:4px 12px 12px 12px}
.user .msg-bubble{background:var(--v);color:var(--bg);border-radius:12px 4px 12px 12px;font-weight:500}
.msg-time{font-size:.6rem;color:var(--muted);margin-top:2px;padding:0 .2rem}

.typing{display:flex;gap:3px;padding:.55rem .8rem;background:var(--bg4);border-radius:4px 12px 12px 12px;width:fit-content}
.typing span{width:5px;height:5px;border-radius:50%;background:var(--muted);animation:tp 1.4s infinite ease-in-out}
.typing span:nth-child(2){animation-delay:.2s}
.typing span:nth-child(3){animation-delay:.4s}
@keyframes tp{0%,80%,100%{transform:scale(.7);opacity:.4}40%{transform:scale(1);opacity:1}}

/* Grid selector (días/horarios) */
.selector-wrap{padding:.8rem 1.2rem;border-top:1px solid var(--border)}
.selector-title{font-size:.68rem;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:.6rem}
.day-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:.4rem;margin-bottom:.6rem}
.slot{font-size:.72rem;padding:.4rem .2rem;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;font-family:var(--fb);text-align:center;transition:all .2s}
.slot:hover{border-color:var(--v);color:var(--v)}
.slot.selected{background:var(--v);color:var(--bg);border-color:var(--v);font-weight:600}
.slot.disabled{opacity:.3;cursor:default;pointer-events:none}
.confirm-btn{width:100%;padding:.55rem;border-radius:100px;background:var(--v);border:none;color:var(--bg);font-family:var(--fb);font-weight:600;font-size:.8rem;cursor:pointer;margin-top:.4rem;transition:opacity .2s}
.confirm-btn:hover{opacity:.85}
.confirm-btn:disabled{opacity:.35;cursor:default}

.quick-replies{display:flex;gap:.5rem;flex-wrap:wrap;padding:.8rem 1.2rem;border-top:1px solid var(--border)}
.qr{font-size:.73rem;padding:.35rem .75rem;border-radius:100px;border:1px solid var(--border2);background:transparent;color:var(--v);cursor:pointer;font-family:var(--fb);transition:all .2s;white-space:nowrap}
.qr:hover{background:rgba(56,224,123,.1)}

.demo-note{margin-top:1.5rem;font-size:.75rem;color:var(--muted);text-align:center;display:flex;align-items:center;gap:.4rem;justify-content:center}
.demo-note::before{content:'';display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--v);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* confirmation card */
.confirm-card{background:rgba(56,224,123,.07);border:1px solid var(--border2);border-radius:12px;padding:.8rem 1rem;font-size:.78rem;line-height:1.6}
.confirm-card strong{color:var(--v);display:block;margin-bottom:.3rem;font-size:.85rem}
</style>
</head>
<body>

<a href="index.html" class="back">← Volver al sitio</a>

<div class="demo-header">
  <p class="demo-label">Demo interactiva</p>
  <h1>Bot de <em>Turnos Médicos</em></h1>
  <p>Sacá un turno completo por WhatsApp, sin hablar con nadie.</p>
</div>

<div class="phone">
  <div class="phone-bar">
    <div class="phone-avatar">🏥</div>
    <div class="phone-info">
      <strong>Centro Médico VerdeAI</strong>
      <span>● Atención automática 24hs</span>
    </div>
  </div>
  <div class="messages" id="msgs"></div>
  <div id="controls"></div>
</div>
<p class="demo-note">Demo en vivo · VerdeAI</p>

<script>
const msgs = document.getElementById('msgs');
const controls = document.getElementById('controls');

let state = 'start';
let chosen = { specialty:'', doctor:'', day:'', time:'' };

function getTime(){return new Date().toLocaleTimeString('es-AR',{hour:'2-digit',minute:'2-digit'})}

function addMsg(text, from, delay=0){
  return new Promise(r => setTimeout(()=>{
    const w = document.createElement('div');
    w.className=`msg ${from}`;
    const av = from==='bot'?'🏥':'😊';
    w.innerHTML=`<div class="msg-avatar">${av}</div><div><div class="msg-bubble">${text.replace(/\n/g,'<br>')}</div><div class="msg-time">${getTime()}</div></div>`;
    msgs.appendChild(w); msgs.scrollTop=msgs.scrollHeight; r();
  }, delay));
}

function showTyping(ms=1200){
  return new Promise(r=>{
    const t=document.createElement('div'); t.className='msg bot'; t.id='typing';
    t.innerHTML=`<div class="msg-avatar">🏥</div><div class="typing"><span></span><span></span><span></span></div>`;
    msgs.appendChild(t); msgs.scrollTop=msgs.scrollHeight;
    setTimeout(()=>{t.remove();r();},ms);
  });
}

function setQuickReplies(opts, handler){
  controls.innerHTML='';
  const wrap=document.createElement('div'); wrap.className='quick-replies';
  opts.forEach(o=>{
    const b=document.createElement('button'); b.className='qr'; b.textContent=o;
    b.onclick=()=>handler(o);
    wrap.appendChild(b);
  });
  controls.appendChild(wrap);
}

function showDaySelector(){
  controls.innerHTML='';
  const wrap=document.createElement('div'); wrap.className='selector-wrap';
  const today=new Date();
  const days=['Lun','Mar','Mié','Jue','Vie'];
  const disabled=[1,3]; // simulamos ocupados

  wrap.innerHTML=`<div class="selector-title">Elegí un día</div><div class="day-grid" id="dayGrid"></div>`;
  controls.appendChild(wrap);

  const grid=document.getElementById('dayGrid');
  for(let i=1;i<=5;i++){
    const d=new Date(today); d.setDate(today.getDate()+i);
    const label=`${days[d.getDay()-1]} ${d.getDate()}/${d.getMonth()+1}`;
    const btn=document.createElement('button');
    btn.className='slot'+(disabled.includes(i)?' disabled':'');
    btn.textContent=label;
    btn.dataset.val=label;
    if(!disabled.includes(i)){
      btn.onclick=()=>{
        document.querySelectorAll('.slot').forEach(s=>s.classList.remove('selected'));
        btn.classList.add('selected'); chosen.day=label;
        const conf=document.getElementById('dayConfirm');
        if(conf) conf.disabled=false;
      };
    }
    grid.appendChild(btn);
  }
  const conf=document.createElement('button');
  conf.className='confirm-btn'; conf.id='dayConfirm'; conf.textContent='Confirmar día →'; conf.disabled=true;
  conf.onclick=async()=>{ controls.innerHTML=''; await onDayChosen(); };
  wrap.appendChild(conf);
}

function showTimeSelector(){
  controls.innerHTML='';
  const wrap=document.createElement('div'); wrap.className='selector-wrap';
  const times=['09:00','09:30','10:00','10:30','11:00','11:30','14:00','14:30','15:00','15:30','16:00'];
  const disabled=[0,2,5,8];
  wrap.innerHTML=`<div class="selector-title">Elegí un horario</div><div class="day-grid" id="timeGrid"></div>`;
  controls.appendChild(wrap);
  const grid=document.getElementById('timeGrid');
  times.forEach((t,i)=>{
    const btn=document.createElement('button');
    btn.className='slot'+(disabled.includes(i)?' disabled':'');
    btn.textContent=t;
    if(!disabled.includes(i)){
      btn.onclick=()=>{
        document.querySelectorAll('.slot').forEach(s=>s.classList.remove('selected'));
        btn.classList.add('selected'); chosen.time=t;
        const conf=document.getElementById('timeConfirm');
        if(conf) conf.disabled=false;
      };
    }
    grid.appendChild(btn);
  });
  const conf=document.createElement('button');
  conf.className='confirm-btn'; conf.id='timeConfirm'; conf.textContent='Confirmar horario →'; conf.disabled=true;
  conf.onclick=async()=>{ controls.innerHTML=''; await onTimeChosen(); };
  wrap.appendChild(conf);
}

// --- FLOW ---
async function start(){
  await addMsg('¡Hola! 👋 Soy el asistente del <strong>Centro Médico VerdeAI</strong>.\nPuedo ayudarte a sacar, cancelar o reprogramar un turno. ¿Qué necesitás?', 'bot');
  setQuickReplies(['Sacar un turno','Cancelar mi turno','Reprogramar turno'], onMenuOption);
}

async function onMenuOption(opt){
  controls.innerHTML='';
  await addMsg(opt, 'user');
  if(opt==='Sacar un turno'){
    await showTyping(900);
    await addMsg('Perfecto. ¿Para qué especialidad necesitás el turno?','bot');
    setQuickReplies(['Clínica médica','Pediatría','Ginecología','Traumatología'], onSpecialty);
  } else if(opt==='Cancelar mi turno'){
    await showTyping(900);
    await addMsg('Entendido. Decime tu número de turno o DNI y lo cancelo al instante.','bot');
    setQuickReplies(['Mi DNI es 38.124.967','Mi turno es #T2841'], onCancel);
  } else {
    await showTyping(900);
    await addMsg('Para reprogramar necesito tu número de turno. ¿Lo tenés a mano?','bot');
    setQuickReplies(['Sí, es #T2841','No lo recuerdo'], onReschedule);
  }
}

async function onSpecialty(s){
  controls.innerHTML='';
  chosen.specialty=s;
  await addMsg(s,'user');
  await showTyping();
  const doctors={
    'Clínica médica':['Dr. Ramírez','Dra. Soto'],
    'Pediatría':['Dra. Villanueva','Dr. Méndez'],
    'Ginecología':['Dra. Torres','Dra. Funes'],
    'Traumatología':['Dr. Ríos','Dr. Acosta']
  };
  const opts=doctors[s]||['Dr. García','Dra. López'];
  await addMsg(`Para <strong>${s}</strong> tenemos disponibles:`, 'bot');
  setQuickReplies(opts, onDoctor);
}

async function onDoctor(d){
  controls.innerHTML='';
  chosen.doctor=d;
  await addMsg(d,'user');
  await showTyping();
  await addMsg(`Perfecto. <strong>${d}</strong> tiene los siguientes días disponibles esta semana. Los marcados en gris ya están completos.`,'bot');
  showDaySelector();
}

async function onDayChosen(){
  await addMsg(chosen.day,'user');
  await showTyping();
  await addMsg(`Bien. Estos son los horarios disponibles el <strong>${chosen.day}</strong> con ${chosen.doctor}. Los grises ya están tomados.`,'bot');
  showTimeSelector();
}

async function onTimeChosen(){
  await addMsg(chosen.time,'user');
  await showTyping(1400);
  await addMsg(`¡Turno confirmado! 🎉 Te envío el resumen:`, 'bot');
  await new Promise(r=>setTimeout(r,300));
  const w=document.createElement('div'); w.className='msg bot';
  const card=`<div class="confirm-card"><strong>✅ Turno registrado</strong>Especialidad: ${chosen.specialty}<br>Médico/a: ${chosen.doctor}<br>Día: ${chosen.day}<br>Hora: ${chosen.time}hs<br>Lugar: Av. Corrientes 1234, CABA</div>`;
  w.innerHTML=`<div class="msg-avatar">🏥</div><div>${card}<div class="msg-time">${getTime()}</div></div>`;
  msgs.appendChild(w); msgs.scrollTop=msgs.scrollHeight;
  await showTyping(1000);
  await addMsg('Te llega un recordatorio 24hs antes por WhatsApp. ¿Necesitás algo más?','bot');
  setQuickReplies(['Sacar otro turno','Cancelar un turno','No, muchas gracias'], onMenuOption);
}

async function onCancel(opt){
  controls.innerHTML='';
  await addMsg(opt,'user');
  await showTyping(1200);
  await addMsg('Encontré el turno: <strong>Dra. Soto – Clínica Médica, Mié 09/04 a las 10:30hs</strong>.\n¿Confirmás la cancelación?','bot');
  setQuickReplies(['Sí, cancelar','No, mantener el turno'], async o=>{
    controls.innerHTML=''; await addMsg(o,'user'); await showTyping(800);
    if(o.startsWith('Sí')){
      await addMsg('✅ Turno cancelado. No se aplicará ningún cargo. ¿Querés sacar un nuevo turno?','bot');
      setQuickReplies(['Sí, sacar nuevo turno','No, gracias'], onMenuOption);
    } else {
      await addMsg('Perfecto, tu turno sigue activo. ¿Puedo ayudarte en algo más?','bot');
      setQuickReplies(['Sacar otro turno','No, gracias'], onMenuOption);
    }
  });
}

async function onReschedule(opt){
  controls.innerHTML='';
  await addMsg(opt,'user');
  await showTyping(1000);
  if(opt.includes('#T2841')){
    await addMsg('Encontré el turno <strong>#T2841 – Dr. Ríos, Traumatología, Jue 10/04 a las 15:00hs</strong>.\nElegí el nuevo día:','bot');
    chosen.specialty='Traumatología'; chosen.doctor='Dr. Ríos';
    showDaySelector();
  } else {
    await addMsg('Sin problema. Podés buscar tu turno ingresando tu DNI.','bot');
    setQuickReplies(['Mi DNI es 38.124.967'], onCancel);
  }
}

start();
</script>
</body>
</html>
