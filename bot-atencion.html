<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Demo – Bot de Atención al Cliente · VerdeAI</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--v:#38e07b;--bg:#080c0a;--bg2:#0d1410;--bg3:#111a14;--bg4:#172019;--border:rgba(56,224,123,0.1);--border2:rgba(56,224,123,0.18);--muted:#6b8a75;--white:#eef6f1;--fs:'Syne',sans-serif;--fb:'DM Sans',sans-serif}
body{background:var(--bg);color:var(--white);font-family:var(--fb);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem 1rem}

.back{position:fixed;top:1.5rem;left:1.5rem;display:flex;align-items:center;gap:.5rem;text-decoration:none;color:var(--muted);font-size:.82rem;border:1px solid var(--border);padding:.4rem .9rem;border-radius:100px;transition:all .2s}
.back:hover{color:var(--white);border-color:var(--border2)}

.demo-header{text-align:center;margin-bottom:2rem}
.demo-label{font-size:.7rem;text-transform:uppercase;letter-spacing:.15em;color:var(--v);margin-bottom:.5rem}
.demo-header h1{font-family:var(--fs);font-weight:800;font-size:clamp(1.6rem,4vw,2.4rem);letter-spacing:-.03em}
.demo-header h1 em{font-style:normal;color:var(--v)}
.demo-header p{color:var(--muted);font-size:.9rem;margin-top:.5rem;font-weight:300}

.phone-wrap{position:relative}
.phone{width:340px;background:var(--bg2);border:1px solid var(--border2);border-radius:28px;overflow:hidden;box-shadow:0 40px 80px rgba(0,0,0,.5)}
.phone-bar{background:var(--bg3);padding:.9rem 1.2rem;display:flex;align-items:center;gap:.7rem;border-bottom:1px solid var(--border)}
.phone-avatar{width:36px;height:36px;border-radius:50%;background:rgba(56,224,123,.15);border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:1.1rem;flex-shrink:0}
.phone-info strong{font-size:.88rem;display:block}
.phone-info span{font-size:.7rem;color:var(--v)}
.phone-back{margin-left:auto;color:var(--muted);font-size:.8rem;cursor:pointer;padding:.3rem .7rem;border:1px solid var(--border);border-radius:100px;transition:all .2s}
.phone-back:hover{color:var(--white)}

.messages{height:380px;overflow-y:auto;padding:1.2rem;display:flex;flex-direction:column;gap:.7rem;scroll-behavior:smooth}
.messages::-webkit-scrollbar{width:3px}
.messages::-webkit-scrollbar-thumb{background:var(--border2);border-radius:10px}

.msg{display:flex;gap:.5rem;align-items:flex-end;max-width:88%}
.msg.bot{align-self:flex-start}
.msg.user{align-self:flex-end;flex-direction:row-reverse}
.msg-avatar{width:26px;height:26px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:.75rem}
.bot .msg-avatar{background:rgba(56,224,123,.12);border:1px solid var(--border2)}
.user .msg-avatar{background:rgba(56,224,123,.25)}
.msg-bubble{font-size:.8rem;padding:.55rem .8rem;border-radius:12px;line-height:1.5}
.bot .msg-bubble{background:var(--bg4);color:var(--white);border-radius:4px 12px 12px 12px}
.user .msg-bubble{background:var(--v);color:var(--bg);border-radius:12px 4px 12px 12px;font-weight:500}
.msg-time{font-size:.6rem;color:var(--muted);margin-top:2px;align-self:flex-end;padding:0 .3rem}

.typing{display:flex;gap:3px;padding:.55rem .8rem;background:var(--bg4);border-radius:4px 12px 12px 12px;width:fit-content}
.typing span{width:5px;height:5px;border-radius:50%;background:var(--muted);animation:tp 1.4s infinite ease-in-out}
.typing span:nth-child(2){animation-delay:.2s}
.typing span:nth-child(3){animation-delay:.4s}
@keyframes tp{0%,80%,100%{transform:scale(.7);opacity:.4}40%{transform:scale(1);opacity:1}}

.quick-replies{display:flex;gap:.5rem;flex-wrap:wrap;padding:.8rem 1.2rem;border-top:1px solid var(--border)}
.qr{font-size:.73rem;padding:.35rem .75rem;border-radius:100px;border:1px solid var(--border2);background:transparent;color:var(--v);cursor:pointer;font-family:var(--fb);transition:all .2s;white-space:nowrap}
.qr:hover{background:rgba(56,224,123,.1)}
.qr:disabled{opacity:.35;cursor:default}

.input-row{display:flex;gap:.5rem;padding:.8rem 1.2rem;border-top:1px solid var(--border);align-items:center}
.chat-input{flex:1;background:var(--bg3);border:1px solid var(--border);border-radius:100px;padding:.45rem 1rem;font-family:var(--fb);font-size:.78rem;color:var(--white);outline:none;transition:border-color .2s}
.chat-input::placeholder{color:var(--muted)}
.chat-input:focus{border-color:var(--border2)}
.send-btn{width:34px;height:34px;border-radius:50%;background:var(--v);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:.85rem;flex-shrink:0;transition:opacity .2s}
.send-btn:hover{opacity:.85}

.demo-note{margin-top:1.5rem;font-size:.75rem;color:var(--muted2,#4a6455);text-align:center;display:flex;align-items:center;gap:.4rem;justify-content:center}
.demo-note::before{content:'';display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--v);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
</style>
</head>
<body>

<a href="../index.html" class="back">← Volver al sitio</a>

<div class="demo-header">
  <p class="demo-label">Demo interactiva</p>
  <h1>Bot de <em>Atención al Cliente</em></h1>
  <p>Probá cómo responde el bot. Escribí o tocá las opciones rápidas.</p>
</div>

<div class="phone-wrap">
  <div class="phone">
    <div class="phone-bar">
      <div class="phone-avatar">🤖</div>
      <div class="phone-info">
        <strong>Asistente VerdeAI</strong>
        <span>● En línea</span>
      </div>
    </div>
    <div class="messages" id="msgs"></div>
    <div class="quick-replies" id="qrs"></div>
    <div class="input-row">
      <input class="chat-input" id="userInput" placeholder="Escribí tu consulta..." autocomplete="off">
      <button class="send-btn" onclick="sendUserMsg()">➤</button>
    </div>
  </div>
</div>
<p class="demo-note">Demo en vivo · VerdeAI</p>

<script>
const msgs = document.getElementById('msgs');
const qrs = document.getElementById('qrs');
const input = document.getElementById('userInput');

input.addEventListener('keydown', e => { if(e.key === 'Enter') sendUserMsg(); });

const responses = [
  {
    keys: ['hola','buenas','hey','buen dia','buenos'],
    reply: '¡Hola! 👋 Soy el asistente virtual. Puedo ayudarte con pedidos, stock, precios y devoluciones. ¿Qué necesitás?',
    quick: ['Ver estado de mi pedido','Consultar stock','Hacer una devolución','Hablar con una persona']
  },
  {
    keys: ['pedido','estado','donde','tracking','envio','cuando llega'],
    reply: '📦 Claro, necesito tu número de pedido para buscarlo. Podés encontrarlo en el mail de confirmación que te enviamos.',
    quick: ['Mi pedido es #4821','Mi pedido es #3307','No tengo el número']
  },
  {
    keys: ['4821'],
    reply: '📦 Pedido #4821 — Estado: <strong>En camino</strong> 🚚\nSalió del depósito hoy a las 10:30hs. Llegada estimada: mañana entre 14:00 y 18:00hs.',
    quick: ['Perfecto, gracias','Cambiar dirección de entrega','Hablar con soporte']
  },
  {
    keys: ['3307'],
    reply: '📦 Pedido #3307 — Estado: <strong>Entregado</strong> ✅\nFue entregado el 31/03 a las 15:22hs. ¿Hubo algún problema con el paquete?',
    quick: ['Todo bien, gracias','Quiero hacer una devolución','No lo recibí']
  },
  {
    keys: ['numero','no tengo'],
    reply: '📧 No hay problema. Buscá en tu casilla un mail con asunto "Tu pedido está confirmado". También podés contarme tu nombre y fecha de compra y lo busco yo.',
    quick: ['Mi nombre es Juan García','Buscar por fecha']
  },
  {
    keys: ['stock','disponible','tienen','hay','producto'],
    reply: '✅ Contame qué producto buscás y en qué color o talle, y te confirmo disponibilidad al instante.',
    quick: ['Remera talle M','Zapatillas 42','Ver categorías']
  },
  {
    keys: ['remera','talle m'],
    reply: '✅ <strong>Remera básica talle M</strong>: disponible en blanco, negro y verde. Stock: 23 unidades. ¿Querés que te pase el precio o lo sumás al carrito?',
    quick: ['¿Cuál es el precio?','Sumar al carrito','Ver otras opciones']
  },
  {
    keys: ['precio','cuanto','cuánto','cuesta','vale'],
    reply: '💲 El precio es <strong>$18.500</strong> con descuento del 10% por pago en efectivo o transferencia. ¿Lo agregamos al carrito?',
    quick: ['Sí, agregar al carrito','No por ahora','Otro producto']
  },
  {
    keys: ['carrito','agregar','comprar'],
    reply: '🛒 ¡Perfecto! Te mando el link de pago directo:\n👉 <span style="color:var(--v)">tienda.verdeai.com/cart/abc123</span>\nVálido por 30 minutos. ¿Necesitás algo más?',
    quick: ['No, gracias','Tengo otra consulta']
  },
  {
    keys: ['devolucion','devolver','cambio','cambiar','no funciona','roto'],
    reply: '↩️ Para iniciar una devolución necesito:\n1. Número de pedido\n2. Motivo (producto dañado, talle incorrecto, otro)\n¿Me pasás esos datos?',
    quick: ['Producto dañado #4821','Talle incorrecto #3307','Otro motivo']
  },
  {
    keys: ['dañado','roto','talle incorrecto'],
    reply: '↩️ Registré tu solicitud de devolución. En 24hs te llega un mail con la etiqueta de envío prepago. Sin costo para vos. ¿Querés que te avisemos por WhatsApp cuando esté listo?',
    quick: ['Sí, avisarme','No hace falta']
  },
  {
    keys: ['persona','humano','agente','soporte','asesor'],
    reply: '👤 Te conecto con un asesor humano. Horario de atención: Lunes a Viernes 9 a 18hs.\nEl tiempo de espera estimado es de <strong>3 minutos</strong>. ¿Continuamos?',
    quick: ['Sí, espero','Prefiero seguir con el bot']
  },
  {
    keys: ['gracias','perfecto','genial','listo','todo bien','no gracias'],
    reply: '¡Con gusto! 😊 Si necesitás algo más, acá estoy. Que tengas un excelente día. 🌟',
    quick: ['Tengo otra consulta','Cerrar chat']
  },
];

const defaultReply = {
  reply: 'Entendido. Para darte la respuesta exacta, ¿me confirmás a cuál de estas opciones se relaciona tu consulta?',
  quick: ['Estado de pedido','Stock y precios','Devolución','Hablar con una persona']
};

function getTime() {
  return new Date().toLocaleTimeString('es-AR', {hour:'2-digit',minute:'2-digit'});
}

function addMsg(text, from, delay=0) {
  return new Promise(resolve => {
    setTimeout(() => {
      const wrap = document.createElement('div');
      wrap.className = `msg ${from}`;
      const avatar = from === 'bot' ? '🤖' : '😊';
      wrap.innerHTML = `
        <div class="msg-avatar">${avatar}</div>
        <div>
          <div class="msg-bubble">${text.replace(/\n/g,'<br>')}</div>
          <div class="msg-time">${getTime()}</div>
        </div>`;
      msgs.appendChild(wrap);
      msgs.scrollTop = msgs.scrollHeight;
      resolve();
    }, delay);
  });
}

function showTyping() {
  return new Promise(resolve => {
    const t = document.createElement('div');
    t.className = 'msg bot';
    t.id = 'typing';
    t.innerHTML = `<div class="msg-avatar">🤖</div><div class="typing"><span></span><span></span><span></span></div>`;
    msgs.appendChild(t);
    msgs.scrollTop = msgs.scrollHeight;
    setTimeout(() => { t.remove(); resolve(); }, 1200);
  });
}

function setQuickReplies(options) {
  qrs.innerHTML = '';
  if (!options) return;
  options.forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'qr';
    btn.textContent = opt;
    btn.onclick = () => { handleUserMessage(opt); };
    qrs.appendChild(btn);
  });
}

function findResponse(text) {
  const lower = text.toLowerCase();
  for (const r of responses) {
    if (r.keys.some(k => lower.includes(k))) return r;
  }
  return defaultReply;
}

async function handleUserMessage(text) {
  setQuickReplies(null);
  await addMsg(text, 'user');
  await showTyping();
  const r = findResponse(text);
  await addMsg(r.reply, 'bot');
  setQuickReplies(r.quick);
}

function sendUserMsg() {
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  handleUserMessage(text);
}

// Start conversation
(async () => {
  await new Promise(r => setTimeout(r, 600));
  await addMsg('¡Hola! 👋 Soy el asistente virtual de la tienda. Puedo ayudarte con pedidos, stock, precios y devoluciones.', 'bot');
  setQuickReplies(['Ver estado de mi pedido','Consultar stock','Hacer una devolución','Hablar con una persona']);
})();
</script>
</body>
</html>
